services:
  - name: aem-backend
    type: web
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend config.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: aem-db
          property: connectionString
      - key: AEM_TIME_ZONE
        value: Asia/Tashkent
      - key: AEM_CORS_ALLOWED_ORIGINS
        sync: false
      - key: AEM_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: AEM_SESSION_COOKIE_SECURE
        value: "True"
      - key: AEM_CSRF_COOKIE_SECURE
        value: "True"
      - key: AEM_SESSION_COOKIE_SAMESITE
        value: None
      - key: AEM_CSRF_COOKIE_SAMESITE
        value: None

databases:
  - name: aem-db
    plan: free
